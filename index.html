<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cardiac Core</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 320px;
    }

    button {
      padding: 12px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
    }

    .connect {
      background: #00ff66;
      color: black;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Cardiac Core</h2>

    <button class="connect" onclick="connectNotionOAuth()">
      Connect with Notion
    </button>

    <div class="status" id="statusText">
      Not connected
    </div>
  </div>

  <script>
    async function connectNotionOAuth() {
      try {
        const state = crypto.randomUUID();
        sessionStorage.setItem('notion_oauth_state', state);

        const res = await fetch(`/api/notion/auth-url?state=${state}`);
        const data = await res.json();

        console.log("Auth response:", data);

        if (!data.url) {
          throw new Error("No auth URL returned");
        }

        // 🔥 THIS is what triggers redirect to Notion
        window.location.href = data.url;

      } catch (err) {
        console.error("OAuth error:", err);
        alert("Notion connection failed:\n\n" + err.message);
      }
    }

    // Optional: check connection status
    async function checkStatus() {
      try {
        const res = await fetch('/api/notion/status');
        const data = await res.json();

        if (data.connected) {
          document.getElementById('statusText').innerText = "Connected ✅";
        } else {
          document.getElementById('statusText').innerText = "Not connected";
        }
      } catch (e) {
        console.error(e);
      }
    }

    checkStatus();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cardiac Core</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00e664;
      --bg: #0c0c0c;
      --surface: #181818;
      --border: rgba(255,255,255,0.09);
      --text: #ffffff;
      --muted: #666;
      --dim: #999;
    }

    html, body {
      height: 100%; height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ─────────────────────────────────────
       MOBILE
    ───────────────────────────────────── */
    .mob {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* Header */
    .mob-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 18px 20px 10px;
      flex-shrink: 0;
    }
    .mob-date {
      font-size: 26px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .mob-menu {
      background: none; border: none;
      color: var(--text); font-size: 22px;
      cursor: pointer; padding: 4px; margin-top: 2px;
      line-height: 1;
    }

    /* Task scroll area */
    .mob-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Task items */
    .task-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      cursor: pointer;
    }
    .task-row + .task-row {
      border-top: 1px solid var(--border);
    }
    .task-check {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: var(--green);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .task-check.empty {
      background: transparent;
      border: 2px solid var(--green);
    }
    .task-check.done-check::after {
      content: '';
      width: 6px; height: 11px;
      border: 2.5px solid #000;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px,-1px);
      display: block;
    }
    .task-text {
      font-size: 17px;
      font-weight: 400;
      line-height: 1.3;
      color: var(--text);
    }
    .task-row.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .task-row.done .task-check {
      background: var(--muted);
      border-color: var(--muted);
    }

    /* Inline add row */
    .add-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }
    .add-row-check {
      width: 28px; height: 28px;
      border-radius: 7px;
      border: 2px solid var(--muted);
      flex-shrink: 0;
    }
    .add-row-input {
      flex: 1;
      background: none; border: none;
      color: var(--dim);
      font-size: 17px; font-family: inherit;
      outline: none;
    }
    .add-row-input::placeholder { color: var(--muted); }
    .add-row-input:focus { color: var(--text); }

    /* Bottom green nav */
    .mob-bottom {
      flex-shrink: 0;
      background: var(--green);
    }
    .day-strip {
      display: flex;
      align-items: center;
      padding: 8px 12px 4px;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 2px;
    }
    .day-strip::-webkit-scrollbar { display: none; }

    .day-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
      padding: 4px 6px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .day-pill:hover { background: rgba(0,0,0,0.08); }
    .day-pill.active {
      background: #000;
      border-radius: 50%;
      width: 52px; min-width: 52px;
      height: 52px;
      justify-content: center;
    }
    .day-pill .p-date {
      font-size: 14px;
      font-weight: 700;
      color: #000;
      line-height: 1;
    }
    .day-pill .p-wd {
      font-size: 10px;
      font-weight: 700;
      color: rgba(0,0,0,0.55);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-top: 1px;
    }
    .day-pill.active .p-date { color: #fff; }
    .day-pill.active .p-wd { color: rgba(255,255,255,0.65); }

    .mob-nav-row {
      display: flex;
      align-items: center;
      padding: 4px 20px 10px;
    }
    .mob-nav-tab {
      flex: 1;
      background: none; border: none;
      font-size: 13px; font-weight: 800;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: #000; cursor: pointer;
      text-align: center; padding: 4px 0;
    }
    .mob-nav-tab .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #000;
      margin: 3px auto 0;
      opacity: 0;
    }
    .mob-nav-tab.active .dot { opacity: 1; }
    .mob-add-tab {
      flex: 1;
      background: none; border: none;
      font-size: 28px; font-weight: 300;
      color: #000; cursor: pointer;
      text-align: center; line-height: 1; padding: 0;
    }

    /* ─────────────────────────────────────
       DESKTOP
    ───────────────────────────────────── */
    .desk {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    /* Green accent line */
    .desk-accent { height: 3px; background: var(--green); flex-shrink: 0; }

    /* Desktop header */
    .desk-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 46px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .desk-logo {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      font-size: 14px; font-weight: 900;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--green);
    }
    .desk-hbtn {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 4px 6px; line-height: 1;
      transition: color 0.15s;
    }
    .desk-hbtn:hover { color: var(--text); }
    .desk-hl { display: flex; align-items: center; gap: 2px; }
    .desk-hr { display: flex; align-items: center; gap: 4px; }

    /* Columns */
    .desk-body {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0;
    }
    .desk-cols {
      flex: 1; display: flex; overflow: hidden; min-height: 0;
    }
    .dcol {
      flex: 1; display: flex; flex-direction: column;
      border-right: 1px solid var(--border); min-width: 0;
    }
    .dcol:last-child { border-right: none; }

    .dcol-head {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .dcol-small {
      font-size: 11px; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 3px;
    }
    .dcol-name {
      font-size: 24px; font-weight: 900;
      text-transform: uppercase; line-height: 1;
      color: var(--text);
    }
    .dcol.is-today .dcol-name { color: var(--green); }

    .dcol-tasks { flex: 1; overflow-y: auto; }

    .dtask {
      padding: 10px 18px;
      font-size: 14px; color: var(--text);
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.1s;
      line-height: 1.35;
    }
    .dtask:hover { background: rgba(255,255,255,0.03); }
    .dtask.done { color: var(--muted); text-decoration: line-through; }

    .dcol-input {
      width: 100%; background: none; border: none;
      border-bottom: 1px solid var(--border);
      color: var(--dim); font-size: 14px; font-family: inherit;
      padding: 10px 18px; outline: none;
    }
    .dcol-input::placeholder { color: var(--muted); }
    .dcol-input:focus { color: var(--text); border-bottom-color: var(--green); }

    /* Rundown */
    .rundown {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      max-height: 260px;
      display: flex; flex-direction: column;
    }
    .rundown-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 18px 5px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .rundown-dots { color: var(--muted); font-size: 15px; cursor: pointer; }
    .rundown-label-wrap {}
    .rundown-label {
      font-size: 12px; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
    }
    .rundown-count { font-size: 12px; color: var(--muted); }
    .rundown-underline { height: 2px; background: var(--green); width: 56px; margin-top: 2px; }
    .rundown-addbtn {
      background: none; border: none;
      color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1;
    }
    .rundown-toggle {
      margin-left: auto; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 14px;
    }

    .rundown-lists {
      display: flex; overflow-x: auto; flex: 1;
      scrollbar-width: thin;
    }
    .rl-col {
      flex: 0 0 240px; border-right: 1px solid var(--border);
      padding: 10px 16px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 0;
    }
    .rl-col:last-child { border-right: none; }
    .rl-title {
      font-size: 13px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 8px;
    }
    .rl-item {
      font-size: 13px; color: var(--text);
      padding: 6px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; line-height: 1.3;
    }
    .rl-item:last-of-type { border-bottom: none; }
    .rl-item.bold { font-weight: 700; }
    .rl-item.muted { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .rl-addinput {
      background: none; border: none;
      border-bottom: 1px solid var(--border);
      color: var(--dim); font-size: 13px; font-family: inherit;
      padding: 6px 0; outline: none; width: 100%; margin-top: 4px;
    }
    .rl-addinput::placeholder { color: var(--muted); }
    .rl-addinput:focus { color: var(--text); border-bottom-color: var(--green); }
    .rl-newbtn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 7px 14px; cursor: pointer; border-radius: 4px;
      margin: 10px 16px; white-space: nowrap; flex-shrink: 0;
      transition: all 0.15s; align-self: flex-start;
    }
    .rl-newbtn:hover { border-color: var(--green); color: var(--green); }

    /* Desktop bottom bar */
    .desk-footer {
      height: 38px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: center; gap: 16px;
      flex-shrink: 0; position: relative;
    }
    .fpg {
      background: none; border: none;
      font-size: 13px; color: var(--muted);
      cursor: pointer; padding: 3px 8px; border-radius: 4px;
      transition: all 0.15s;
    }
    .fpg:hover { color: var(--text); }
    .fpg.active { background: var(--green); color: #000; font-weight: 700; }
    .f-icon {
      background: none; border: none;
      color: var(--muted); font-size: 15px; cursor: pointer;
      position: absolute;
    }

    /* ─────────────────────────────────────
       SETTINGS DRAWER
    ───────────────────────────────────── */
    .s-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .s-overlay.open { opacity: 1; pointer-events: all; }
    .s-drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 280px;
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 201; transform: translateX(100%);
      transition: transform 0.25s ease; padding: 20px 0;
      display: flex; flex-direction: column;
    }
    .s-overlay.open .s-drawer { transform: translateX(0); }
    .s-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px 14px; border-bottom: 1px solid var(--border); margin-bottom: 6px;
    }
    .s-title { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .s-x { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
    .s-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 20px; font-size: 14px; color: var(--dim);
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
      transition: background 0.12s, color 0.12s; font-family: inherit;
    }
    .s-row:hover { background: #222; color: #fff; }
    .s-row.red { color: #e64444; }
    .s-row.red:hover { color: #ff6666; }

    /* ─────────────────────────────────────
       ADD TASK MODAL (mobile)
    ───────────────────────────────────── */
    .add-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 300;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .add-modal.open { opacity: 1; pointer-events: all; }
    .add-sheet {
      width: 100%; background: var(--surface);
      border-radius: 18px 18px 0 0;
      padding: 20px 16px 36px;
      transform: translateY(100%);
      transition: transform 0.25s ease;
    }
    .add-modal.open .add-sheet { transform: translateY(0); }
    .add-handle { width: 36px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 20px; }
    .add-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .add-inp {
      width: 100%; background: #222; border: 1px solid #333;
      border-radius: 10px; color: #fff; font-size: 16px;
      padding: 12px 14px; outline: none; margin-bottom: 14px; font-family: inherit;
    }
    .add-inp:focus { border-color: var(--green); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
    .chip {
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid #333; background: none;
      color: #888; font-size: 12px; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .chip.sel { border-color: var(--green); color: var(--green); background: rgba(0,230,100,0.1); }
    .add-submit {
      width: 100%; background: var(--green); border: none;
      border-radius: 10px; color: #000; font-size: 15px;
      font-weight: 700; padding: 13px; cursor: pointer; font-family: inherit;
    }

    /* ─────────────────────────────────────
       API KEY MODAL
    ───────────────────────────────────── */
    .api-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 400;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .api-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px 20px; width: 100%; max-width: 380px;
    }
    .api-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .api-desc { font-size: 13px; color: var(--dim); margin-bottom: 16px; line-height: 1.5; }
    .api-inp {
      width: 100%; background: #222; border: 1px solid var(--border);
      border-radius: 8px; color: #fff; font-size: 14px;
      padding: 10px 12px; outline: none; margin-bottom: 12px; font-family: monospace;
    }
    .api-inp:focus { border-color: var(--green); }
    .api-btns { display: flex; gap: 8px; }
    .api-save {
      flex: 1; background: var(--green); border: none;
      border-radius: 8px; color: #000; font-size: 14px; font-weight: 700;
      padding: 10px; cursor: pointer;
    }
    .api-cancel {
      background: #222; border: 1px solid var(--border);
      border-radius: 8px; color: var(--dim); font-size: 14px;
      padding: 10px 16px; cursor: pointer;
    }

    .hidden { display: none !important; }

    @media (min-width: 680px) {
      .mob  { display: none; }
      .desk { display: flex; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     MOBILE
══════════════════════════════════ -->
<div class="mob" id="mob">

  <header class="mob-header">
    <div class="mob-date" id="mobDate"></div>
    <button class="mob-menu" onclick="openSettings()">≡</button>
  </header>

  <div class="mob-scroll" id="mobScroll"></div>

  <div class="mob-bottom">
    <div class="day-strip" id="dayStrip"></div>
    <div class="mob-nav-row">
      <button class="mob-nav-tab active" id="tabToday" onclick="mobTab('today')">
        TODAY<div class="dot"></div>
      </button>
      <button class="mob-add-tab" onclick="openAddModal()">+</button>
      <button class="mob-nav-tab" id="tabSomeday" onclick="mobTab('someday')">
        SOMEDAY<div class="dot"></div>
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     DESKTOP
══════════════════════════════════ -->
<div class="desk" id="desk">

  <div class="desk-accent"></div>

  <header class="desk-header">
    <div class="desk-hl">
      <button class="desk-hbtn" title="Search">🔍</button>
    </div>
    <div class="desk-logo">CARDIAC CORE</div>
    <div class="desk-hr">
      <button class="desk-hbtn" onclick="dNav(-5)" title="Back week">«</button>
      <button class="desk-hbtn" onclick="dNav(-1)" title="Previous">‹</button>
      <button class="desk-hbtn" onclick="dNav(1)"  title="Next">›</button>
      <button class="desk-hbtn" onclick="dNav(5)"  title="Forward week">»</button>
      <button class="desk-hbtn" onclick="openSettings()" title="Menu">≡</button>
    </div>
  </header>

  <div class="desk-body">
    <div class="desk-cols" id="deskCols"></div>

    <div class="rundown">
      <div class="rundown-bar">
        <span class="rundown-dots">⋮</span>
        <div class="rundown-label-wrap">
          <div class="rundown-label">
            Rundown <span class="rundown-count" id="rdCount">0</span>
            <button class="rundown-addbtn" onclick="addRdList()">+</button>
          </div>
          <div class="rundown-underline"></div>
        </div>
        <button class="rundown-toggle" onclick="toggleRd()">▾</button>
      </div>
      <div class="rundown-lists" id="rdLists"></div>
    </div>
  </div>

  <footer class="desk-footer">
    <button class="f-icon" style="left:16px" onclick="openSettings()">↺</button>
    <button class="fpg" onclick="dJump(-4)">1</button>
    <button class="fpg" onclick="dJump(-2)">3</button>
    <button class="fpg active"            >5</button>
    <button class="fpg" onclick="dJump(2)">7</button>
    <button class="f-icon" style="right:40px">⚙</button>
    <button class="f-icon" style="right:14px">👤</button>
  </footer>
</div>

<!-- SETTINGS DRAWER -->
<div class="s-overlay" id="sOverlay" onclick="overlayClose(event)">
  <div class="s-drawer">
    <div class="s-head">
      <span class="s-title">Settings</span>
      <button class="s-x" onclick="closeSettings()">×</button>
    </div>
    <button class="s-row" onclick="doSync()">🔄&nbsp; Sync with Notion</button>
    <button class="s-row" onclick="doExport()">📤&nbsp; Export Tasks</button>
    <button class="s-row" onclick="doLoadExamples()">✨&nbsp; Load Example Tasks</button>
    <button class="s-row" onclick="doManageKey()">🔑&nbsp; Manage API Key</button>
    <button class="s-row red" onclick="doClear()">🗑&nbsp; Clear All Tasks</button>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="add-modal" id="addModal" onclick="addModalOutside(event)">
  <div class="add-sheet" onclick="stopProp(event)">
    <div class="add-handle"></div>
    <div class="add-lbl">Task</div>
    <input class="add-inp" id="addInp" placeholder="What needs to get done?" />
    <div class="add-lbl">Category</div>
    <div class="chip-row" id="catChips"></div>
    <div class="add-lbl">Add to</div>
    <div class="chip-row" id="targetChips">
      <button class="chip sel" data-t="today">Today</button>
      <button class="chip"     data-t="tomorrow">Tomorrow</button>
      <button class="chip"     data-t="someday">Someday</button>
    </div>
    <button class="add-submit" onclick="submitAdd()">Add Task</button>
  </div>
</div>

<!-- API KEY MODAL -->
<div class="api-modal hidden" id="apiModal">
  <div class="api-box">
    <div class="api-title">API Key Required</div>
    <div class="api-desc">Enter your Claude API key to use Notion sync. You'll only be asked when you need it.</div>
    <input class="api-inp" id="apiInp" type="password" placeholder="sk-ant-..." />
    <div class="api-btns">
      <button class="api-cancel" onclick="closeApiModal()">Cancel</button>
      <button class="api-save"   onclick="saveApiKey()">Save</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const CATS = ['Personal','Cardiac','Benefits Board','Property Management','Research','Finance'];

const EXAMPLE_TASKS = [
  {id:'e1', text:'Send art and Gayla email update', cat:'Personal',           dateKey:'today',    done:false},
  {id:'e2', text:'Call Aaron',                      cat:'Cardiac',            dateKey:'today',    done:false},
  {id:'e3', text:'Message Aptive',                  cat:'Property Management',dateKey:'today',    done:false},
  {id:'e4', text:'Buy mom iPad',                    cat:'Personal',           dateKey:'today',    done:false},
  {id:'e5', text:'Review Q1 financials',            cat:'Finance',            dateKey:'tomorrow', done:false},
  {id:'e6', text:'Benefits board meeting prep',     cat:'Benefits Board',     dateKey:'tomorrow', done:false},
  {id:'e7', text:'Research CRM options',            cat:'Research',           dateKey:'someday',  done:false},
  {id:'e8', text:'Update provider contracts',       cat:'Cardiac',            dateKey:'someday',  done:false},
];

const EXAMPLE_RUNDOWN = [
  {id:'rl1',title:'WORK PAYMENTS',items:[
    {id:'ri1',text:'Communications days (0) need (100)',bold:false,muted:true},
    {id:'ri2',text:'Invoices to submit',bold:true},
    {id:'ri3',text:'April 16 - Council Setup'},
    {id:'ri4',text:'April 15 - chapel'},
    {id:'ri5',text:'April 14 - Chapel Setup'},
    {id:'ri6',text:'Pending',bold:true},
    {id:'ri7',text:'Cardiac Invoices',muted:true},
  ]},
  {id:'rl2',title:'THIS WEEK',items:[{id:'ri8',text:'Pay graduation fee'}]},
  {id:'rl3',title:'WEEKEND',items:[
    {id:'ri9', text:'Prep for Wednesday meeting'},
    {id:'ri10',text:'Watch AI videos'},
    {id:'ri11',text:'Kalea anniversary gift'},
    {id:'ri12',text:'Buy playing card holders for Mother\'s…'},
    {id:'ri13',text:'Replace Air filters'},
  ]},
  {id:'rl4',title:'NEXT WEEK',items:[]},
];

let tasks    = [];
let rundown  = [];
let mOffset  = 0;    // mobile: days offset from today
let mView    = 'today'; // 'today' | 'someday'
let dOffset  = 0;    // desktop: column start offset
let selCat   = CATS[0];
let selTarget= 'today';

// ── INIT ──────────────────────────────────────────────────────────────
function init(){
  const st = localStorage.getItem('cc_tasks');
  if(st){
    tasks = JSON.parse(st);
  } else {
    tasks = EXAMPLE_TASKS.map(t=>({...t, dateKey: resolveKey(t.dateKey)}));
    saveTasks();
  }
  const sr = localStorage.getItem('cc_rundown');
  if(sr) rundown = JSON.parse(sr);
  else { rundown = EXAMPLE_RUNDOWN; saveRundown(); }

  buildCatChips();
  buildTargetChips();
  renderMob();
  renderDesk();
}

function saveTasks()  { localStorage.setItem('cc_tasks',   JSON.stringify(tasks));   }
function saveRundown(){ localStorage.setItem('cc_rundown', JSON.stringify(rundown)); }

// ── DATE UTILS ────────────────────────────────────────────────────────
function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function dayAt(n){ const d=today(); d.setDate(d.getDate()+n); return d; }
function dKey(d){ return d.toISOString().slice(0,10); }
function todayKey(){    return dKey(today()); }
function tomorrowKey(){ return dKey(dayAt(1)); }
function resolveKey(k){
  if(k==='today')    return todayKey();
  if(k==='tomorrow') return tomorrowKey();
  return 'someday';
}
function fmtHeader(n){
  const d = dayAt(n);
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
}
function fmtSmall(d){
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase();
}

// ── MOBILE RENDER ─────────────────────────────────────────────────────
function renderMob(){
  renderMobHeader();
  renderDayStrip();
  renderMobTasks();
}

function renderMobHeader(){
  const el = document.getElementById('mobDate');
  el.textContent = mView === 'someday' ? 'SOMEDAY' : fmtHeader(mOffset);
}

function renderDayStrip(){
  const el = document.getElementById('dayStrip');
  let html = '';
  for(let i=0; i<8; i++){
    const d  = dayAt(i);
    const m  = d.getMonth()+1;
    const dy = d.getDate();
    const wd = d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
    const active = (mView==='today' && i===mOffset);
    html += `<div class="day-pill ${active?'active':''}" onclick="goDay(${i})">
      <div class="pill-wrap">
        <div class="p-date">${m}/${dy}</div>
        <div class="p-wd">${wd}</div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function renderMobTasks(){
  const el = document.getElementById('mobScroll');
  let key, list;
  if(mView==='someday'){
    key  = 'someday';
    list = tasks.filter(t=>t.dateKey==='someday');
  } else {
    key  = dKey(dayAt(mOffset));
    list = tasks.filter(t=>t.dateKey===key);
  }

  let html = '';
  list.forEach(t=>{
    html += `<div class="task-row ${t.done?'done':''}" onclick="toggle('${t.id}')">
      <div class="task-check ${t.done?'done-check':'empty'}"></div>
      <div class="task-text">${esc(t.text)}</div>
    </div>`;
  });
  // inline add
  html += `<div class="add-row">
    <div class="add-row-check"></div>
    <input class="add-row-input" placeholder="Add a task…" data-key="${key}" onkeydown="if(event.key==='Enter')quickAdd(this)" />
  </div>`;
  el.innerHTML = html;
}

function goDay(n){
  mOffset = n;
  mView   = 'today';
  document.getElementById('tabToday').classList.add('active');
  document.getElementById('tabSomeday').classList.remove('active');
  renderMob();
}

function mobTab(tab){
  mView = tab;
  document.getElementById('tabToday').classList.toggle('active',   tab==='today');
  document.getElementById('tabSomeday').classList.toggle('active', tab==='someday');
  renderMob();
}

// ── DESKTOP RENDER ────────────────────────────────────────────────────
function renderDesk(){
  const el = document.getElementById('deskCols');
  let html = '';
  for(let i=0; i<5; i++){
    const d     = dayAt(dOffset + i);
    const key   = dKey(d);
    const isNow = key === todayKey();
    const dName = d.toLocaleDateString('en-US',{weekday:'long'}).toUpperCase();
    const small = fmtSmall(d);
    const list  = tasks.filter(t=>t.dateKey===key);

    html += `<div class="dcol ${isNow?'is-today':''}" data-key="${key}">
      <div class="dcol-head">
        <div class="dcol-small">${small}</div>
        <div class="dcol-name">${dName}</div>
      </div>
      <div class="dcol-tasks">`;
    list.forEach(t=>{
      html += `<div class="dtask ${t.done?'done':''}" onclick="toggle('${t.id}')">${esc(t.text)}</div>`;
    });
    html += `</div>
      <input class="dcol-input" placeholder="Add a task…" data-key="${key}" onkeydown="if(event.key==='Enter')quickAdd(this)" />
    </div>`;
  }
  el.innerHTML = html;
  renderRundown();
}

function dNav(n){ dOffset += n; renderDesk(); }
function dJump(n){ dOffset += n; renderDesk(); }

// ── RUNDOWN ───────────────────────────────────────────────────────────
function renderRundown(){
  const el    = document.getElementById('rdLists');
  const count = document.getElementById('rdCount');
  let total = 0, html = '';
  rundown.forEach(list=>{
    total += list.items.length;
    html += `<div class="rl-col">
      <div class="rl-title">${esc(list.title)}</div>`;
    list.items.forEach(item=>{
      const cls = [item.bold?'bold':'', item.muted?'muted':''].filter(Boolean).join(' ');
      html += `<div class="rl-item ${cls}">${esc(item.text)}</div>`;
    });
    html += `<input class="rl-addinput" placeholder="+ Add item" data-lid="${list.id}"
               onkeydown="if(event.key==='Enter')addRdItem(this)" />
    </div>`;
  });
  html += `<button class="rl-newbtn" onclick="addRdList()">+ New List</button>`;
  el.innerHTML = html;
  count.textContent = total;
}

function toggleRd(){
  const el = document.getElementById('rdLists');
  el.style.display = el.style.display==='none' ? '' : 'none';
}

function addRdItem(input){
  const text = input.value.trim();
  if(!text) return;
  const list = rundown.find(l=>l.id===input.dataset.lid);
  if(list){ list.items.push({id:'ri'+Date.now(), text}); saveRundown(); renderRundown(); }
  input.value='';
}

function addRdList(){
  const name = prompt('List name:');
  if(!name) return;
  rundown.push({id:'rl'+Date.now(), title:name.toUpperCase(), items:[]});
  saveRundown(); renderRundown();
}

// ── TASKS ─────────────────────────────────────────────────────────────
function toggle(id){
  const t = tasks.find(t=>t.id===id);
  if(t){ t.done=!t.done; saveTasks(); renderMob(); renderDesk(); }
}

function quickAdd(input){
  const text = input.value.trim();
  if(!text) return;
  tasks.push({id:'t'+Date.now(), text, cat:selCat, dateKey:input.dataset.key, done:false});
  input.value='';
  saveTasks(); renderMob(); renderDesk();
}

// ── ADD MODAL ─────────────────────────────────────────────────────────
function buildCatChips(){
  document.getElementById('catChips').innerHTML = CATS.map((c,i)=>
    `<button class="chip ${i===0?'sel':''}" data-c="${c}" onclick="pickCat('${c}')">${c}</button>`
  ).join('');
}
function pickCat(c){
  selCat = c;
  document.querySelectorAll('#catChips .chip').forEach(b=>b.classList.toggle('sel',b.dataset.c===c));
}

function buildTargetChips(){
  document.querySelectorAll('#targetChips .chip').forEach(b=>{
    b.addEventListener('click',()=>{
      selTarget = b.dataset.t;
      document.querySelectorAll('#targetChips .chip').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
    });
  });
}

function openAddModal(){
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('addInp').focus(),280);
}
function addModalOutside(e){
  if(e.target===document.getElementById('addModal')) document.getElementById('addModal').classList.remove('open');
}
function stopProp(e){ e.stopPropagation(); }

function submitAdd(){
  const text = document.getElementById('addInp').value.trim();
  if(!text) return;
  const key = resolveKey(selTarget);
  tasks.push({id:'t'+Date.now(), text, cat:selCat, dateKey:key, done:false});
  document.getElementById('addInp').value='';
  document.getElementById('addModal').classList.remove('open');
  saveTasks();
  if(selTarget==='someday'){ mView='someday'; }
  else { mView='today'; mOffset = selTarget==='tomorrow'?1:0; }
  renderMob(); renderDesk();
}

// ── SETTINGS ─────────────────────────────────────────────────────────
function openSettings()  { document.getElementById('sOverlay').classList.add('open'); }
function closeSettings() { document.getElementById('sOverlay').classList.remove('open'); }
function overlayClose(e) { if(e.target===document.getElementById('sOverlay')) closeSettings(); }

function doSync(){
  closeSettings();
  if(!localStorage.getItem('cc_apikey')){ openApiModal(); return; }
  alert('Notion sync coming soon!');
}
function doExport(){
  closeSettings();
  const b = new Blob([JSON.stringify({tasks,rundown},null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='cardiac-core.json'; a.click();
}
function doLoadExamples(){
  closeSettings();
  if(!confirm('Replace current tasks with example tasks?')) return;
  tasks   = EXAMPLE_TASKS.map(t=>({...t, dateKey:resolveKey(t.dateKey)}));
  rundown = EXAMPLE_RUNDOWN;
  saveTasks(); saveRundown(); renderMob(); renderDesk();
}
function doManageKey(){ closeSettings(); openApiModal(); }
function doClear(){
  closeSettings();
  if(!confirm('Clear all tasks?')) return;
  tasks=[]; saveTasks(); renderMob(); renderDesk();
}

// ── API KEY ───────────────────────────────────────────────────────────
function openApiModal(){
  document.getElementById('apiInp').value = localStorage.getItem('cc_apikey')||'';
  document.getElementById('apiModal').classList.remove('hidden');
}
function closeApiModal(){ document.getElementById('apiModal').classList.add('hidden'); }
function saveApiKey(){
  const v = document.getElementById('apiInp').value.trim();
  if(v) localStorage.setItem('cc_apikey',v);
  closeApiModal();
}

// ── UTIL ──────────────────────────────────────────────────────────────
function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── GO ────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>

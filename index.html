            if (notionConnected) pushTaskToNotion(task);
        }

        // ── Drag handle reorder (day view, touch-only) ──────────
        // Touch the ⠿ handle on a task to lift it; drag up/down to reorder
        // within the current day. Releases settle a new `order` for every
        // task on this day and persist to localStorage + Notion.
        function attachDragHandleListeners(wrapper) {
            const handle = wrapper.querySelector('[data-role="drag-handle"]');
            if (!handle) return;

            const taskItem = wrapper.querySelector('.task-item');
            const list = wrapper.parentElement;
            if (!taskItem || !list) return;

            let dragging = false;
            let startY = 0;
            let currentY = 0;
            let wrapperHeight = 0;
            let originalIndex = 0;
            let siblings = [];     // array of .task-item-wrapper elements at drag-start time
            let placeholderIndex = 0; // current insertion index within `siblings`

            // Prevent the parent's click/swipe handlers from firing when the
            // user starts on the handle. We stop propagation so the wrapper's
            // touchstart still runs but its `onHandle` guard short-circuits it.
            handle.addEventListener('touchstart', e => {
                if (!e.touches[0]) return;
                e.stopPropagation();
                dragging = true;
                startY = e.touches[0].clientY;
                currentY = 0;

                wrapperHeight = wrapper.offsetHeight;
                siblings = Array.from(list.querySelectorAll('.task-item-wrapper'));
                originalIndex = siblings.indexOf(wrapper);
                placeholderIndex = originalIndex;

                wrapper.classList.add('dragging');
                // Other rows animate when shifted.
                siblings.forEach(s => { if (s !== wrapper) s.classList.add('drag-shift'); });
            }, { passive: true });

            handle.addEventListener('touchmove', e => {
                if (!dragging || !e.touches[0]) return;
                e.preventDefault();
                currentY = e.touches[0].clientY - startY;
                taskItem.style.transition = 'none';
                taskItem.style.transform = `translateY(${currentY}px)`;

                // Determine where the dragged row should slot in. We use the
                // dragged row's center vs each sibling's center.
                const draggedCenter = wrapper.getBoundingClientRect().top
                    + wrapperHeight / 2 + currentY;

                let newIndex = originalIndex;
                for (let i = 0; i < siblings.length; i++) {
                    const sib = siblings[i];
                    if (sib === wrapper) continue;
                    const sibRect = sib.getBoundingClientRect();
                    const sibCenter = sibRect.top + sibRect.height / 2;
                    if (draggedCenter > sibCenter) newIndex = i + (i > originalIndex ? 0 : 1);
                    else { newIndex = i + (i > originalIndex ? -1 : 0); break; }
                }
                // Clamp
                if (newIndex < 0) newIndex = 0;
                if (newIndex > siblings.length - 1) newIndex = siblings.length - 1;

                if (newIndex !== placeholderIndex) {
                    placeholderIndex = newIndex;
                    // Visually shift siblings. Each non-dragged sibling either
                    // moves up by wrapperHeight (if its old position is now
                    // below the placeholder but was above origin), or moves
                    // down (vice versa), or sits still.
                    siblings.forEach((sib, i) => {
                        if (sib === wrapper) return;
                        let shift = 0;
                        if (originalIndex < placeholderIndex
                            && i > originalIndex && i <= placeholderIndex) {
                            shift = -wrapperHeight;
                        } else if (originalIndex > placeholderIndex
                            && i >= placeholderIndex && i < originalIndex) {
                            shift = wrapperHeight;
                        }
                        sib.style.transform = `translateY(${shift}px)`;
                    });
                }
            }, { passive: false });

            const finish = () => {
                if (!dragging) return;
                dragging = false;

                // Clean up styles.
                taskItem.style.transition = '';
                taskItem.style.transform = '';
                siblings.forEach(s => {
                    s.style.transform = '';
                    s.classList.remove('drag-shift');
                });
                wrapper.classList.remove('dragging');

                if (placeholderIndex !== originalIndex) {
                    commitReorder(siblings, originalIndex, placeholderIndex);
                }
                siblings = [];
            };
            handle.addEventListener('touchend', finish);
            handle.addEventListener('touchcancel', finish);
        }

        // Apply the new visual order to the task list and persist. Operates
        // only on the tasks that were visible in the day view at drag-start
        // — Someday tasks and other days are untouched.
        function commitReorder(siblings, fromIndex, toIndex) {
            // Build the new ID order from the sibling list.
            const taskIds = siblings.map(s => Number(s.dataset.taskId));
            const [moved] = taskIds.splice(fromIndex, 1);
            taskIds.splice(toIndex, 0, moved);

            // Rewrite `order` on each affected task.
            taskIds.forEach((id, idx) => {
                const t = tasks.find(x => x.id === id);
                if (t) t.order = idx;
            });

            saveTasks();
            renderTasks();
            // Order is local-only metadata; we don't push to Notion since
            // there's no equivalent property in the user's schema. (If a
            // Notion "Order" property is ever added, this is the spot.)
        }

        function escapeHtml(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function initPullToRefresh() {
            const mobileView = document.querySelector('.mobile-view');
            const indicator = document.getElementById('pullIndicator');
            let startY = 0;
            let pulling = false;

            mobileView.addEventListener('touchstart', e => {
                if (mobileView.scrollTop === 0) {
                    startY = e.touches[0].clientY;
                    pulling = true;
                }
            }, { passive: true });

            mobileView.addEventListener('touchmove', e => {
                if (!pulling) return;
                const dy = e.touches[0].clientY - startY;
                if (dy > 50) indicator.classList.add('visible');
                else indicator.classList.remove('visible');
            }, { passive: true });

            mobileView.addEventListener('touchend', () => {
                if (indicator.classList.contains('visible') && notionConnected) {
                    indicator.textContent = '↻ Syncing...';
                    syncFromNotion().finally(() => {
                        indicator.classList.remove('visible');
                        indicator.textContent = '↓ Release to sync Notion';
                    });
                }
                pulling = false;
            });
        }

        // Initialize on load
        init();
    </script>
</body>
</html>

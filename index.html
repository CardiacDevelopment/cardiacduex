<!DOCTYPE html>
<html lang="en" style="background:#0a0a0a;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Cardiac Core</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #0a0a0a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-green: #00ff66;
            --accent-green-dark: #00cc52;
            --border-color: #333333;
            --task-bg: #252525;
            color-scheme: dark;
        }

        html, body {
            background: #0a0a0a !important;
            color: #ffffff !important;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-primary);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .date-display {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 24px;
            padding: 4px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            padding: 4px 12px;
            background: var(--task-bg);
            border-radius: 20px;
            margin-right: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .status-dot.disconnected {
            background: #888888;
        }

        .mobile-view {
            display: block;
            padding: 0;
            overflow-y: auto;
            height: calc(100vh - 110px);
            padding-bottom: 20px;
        }

        .day-column {
            background: var(--bg-secondary);
            min-height: calc(100vh - 200px);
            padding: 20px;
        }

        .day-header {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 100px;
        }

        .task-item {
            background: var(--task-bg);
            border-left: 3px solid var(--accent-green);
            padding: 14px 16px;
            border-radius: 4px;
            font-size: 15px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .task-item:active {
            background: #2a2a2a;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-green);
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 2px;
            cursor: pointer;
        }

        .task-checkbox.checked {
            background: var(--accent-green);
            position: relative;
        }

        .task-checkbox.checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--bg-primary);
            font-size: 12px;
            font-weight: bold;
        }

        .task-text {
            flex: 1;
            line-height: 1.4;
        }

        .task-text.completed {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .task-category {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Bottom Navigation */
        .bottom-nav {
            background: var(--accent-green);
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid var(--accent-green-dark);
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--bg-primary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            transition: background 0.2s ease;
        }

        .nav-item.active {
            background: var(--bg-primary);
            color: var(--accent-green);
        }

        .nav-item:active {
            opacity: 0.8;
        }

        .add-task-btn {
            width: 48px;
            height: 48px;
            background: var(--bg-primary);
            border: none;
            border-radius: 50%;
            color: var(--accent-green);
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .add-task-btn:active {
            transform: scale(0.95);
        }

        /* Day Navigation (mobile) */
        .day-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .day-nav button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
        }

        .current-day {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Task Board View */
        .task-board-view {
            display: none;
            padding: 20px 20px 100px;
            overflow-y: auto;
            height: calc(100vh - 110px);
        }

        .task-board-view.active {
            display: block;
        }

        .mobile-view.hidden,
        .day-nav.hidden {
            display: none;
        }

        .category-group {
            margin-bottom: 28px;
        }

        .category-group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .category-group-header .category-dot {
            width: 10px;
            height: 10px;
        }

        .category-group-chevron {
            font-size: 10px;
            color: var(--text-secondary);
            transition: transform 0.15s ease;
            display: inline-block;
            width: 10px;
        }

        .category-group.collapsed .category-group-chevron {
            transform: rotate(-90deg);
        }

        .category-group-count {
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: auto;
        }

        .category-group-add {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
        }

        .category-group-add:active {
            background: var(--task-bg);
        }

        .category-group-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-group.collapsed .category-group-body {
            display: none;
        }

        .category-add-input {
            background: var(--task-bg);
            border: 2px solid var(--accent-green);
            border-radius: 4px;
            padding: 12px 14px;
            font-size: 15px;
            color: var(--text-primary);
            width: 100%;
            font-family: inherit;
            display: none;
        }

        .category-add-input.visible {
            display: block;
        }

        .category-add-input:focus {
            outline: none;
        }

        .board-empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 60px 20px;
            font-size: 14px;
        }

        /* Backburner section — tucked at the bottom of the task board.
           Muted to signal "out of sight", but uses the same group anatomy. */
        .backburner-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            opacity: 0.75;
        }

        .backburner-section .task-item {
            opacity: 0.7;
        }

        .backburner-section .category-group-header {
            color: var(--text-secondary);
        }

        /* Add task input */
        .add-task-input {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: var(--task-bg);
            border: 2px solid var(--accent-green);
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            color: var(--text-primary);
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .add-task-input:focus {
            outline: none;
        }

        .add-task-input.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--bg-primary);
            border-left: 1px solid var(--border-color);
            transition: right 0.3s ease;
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .settings-title {
            font-size: 18px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-button {
            width: 100%;
            background: var(--task-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .setting-button:hover {
            background: #2a2a2a;
        }

        .setting-button.accent {
            background: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            font-weight: 600;
        }

        .setting-button.accent:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .setting-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: var(--task-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s ease;
            flex-shrink: 0;
        }

        .toggle-switch.on {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: var(--text-primary);
            border-radius: 50%;
            transition: transform 0.2s ease;
        }

        .toggle-switch.on::after {
            transform: translateX(20px);
            background: var(--bg-primary);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
            padding: 20px;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-button {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .modal-button:active {
            opacity: 0.8;
        }

        .modal-button.cancel {
            background: var(--task-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .modal-button.confirm {
            background: var(--accent-green);
            border: none;
            color: var(--bg-primary);
            font-weight: 600;
        }

        /* ── Date Picker Sheet ─────────────────────────────────── */
        .date-picker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 310;
            padding: 0;
        }

        .date-picker-overlay.visible {
            display: flex;
        }

        .date-picker-sheet {
            background: var(--bg-primary);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .date-picker-header {
            padding: 20px 20px 16px;
        }

        /* Unified task sheet additions */
        .task-sheet-input {
            width: 100%;
            background: var(--task-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 14px;
        }

        .task-sheet-input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .task-sheet-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .task-sheet-cat {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.6;
            transition: opacity 0.15s ease, border-color 0.15s ease;
        }

        .task-sheet-cat.selected {
            opacity: 1;
            border-color: var(--text-primary);
        }

        .task-sheet-footer {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .task-sheet-cancel,
        .task-sheet-backburner,
        .task-sheet-save {
            flex: 1;
            padding: 12px 8px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }

        .task-sheet-cancel {
            background: var(--task-bg);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .task-sheet-backburner {
            background: #88878022;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .task-sheet-backburner.active {
            background: #00ff6622;
            color: var(--accent-green);
            border-color: var(--accent-green);
        }

        .task-sheet-save {
            background: var(--accent-green);
            color: var(--bg-primary);
        }

        /* Day-nav picker chips (Jump to day) */
        .day-nav-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .day-nav-chip {
            padding: 10px 14px;
            background: var(--task-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
        }

        .day-nav-chip:active {
            background: var(--accent-green);
            color: var(--bg-primary);
            border-color: var(--accent-green);
        }

        .day-nav-chip.current {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .date-picker-quick-btns {
            display: flex;
            gap: 10px;
        }

        .date-picker-quick-btn {
            flex: 1;
            padding: 12px;
            background: var(--task-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .date-picker-quick-btn:active {
            background: var(--accent-green);
            color: var(--bg-primary);
            border-color: var(--accent-green);
        }

        /* Calendar grid */
        .date-picker-calendar {
            background: var(--accent-green);
            padding: 16px 20px 28px;
        }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .calendar-month-label {
            font-size: 16px;
            font-weight: 700;
            color: var(--bg-primary);
        }

        .calendar-nav-btn {
            background: none;
            border: none;
            color: var(--bg-primary);
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 6px;
            line-height: 1;
        }

        .calendar-nav-btn:active {
            background: rgba(0, 0, 0, 0.15);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .calendar-dow {
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--bg-primary);
            opacity: 0.75;
            padding: 4px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 500;
            color: var(--bg-primary);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.1s ease;
        }

        .calendar-day:active {
            background: rgba(0, 0, 0, 0.2);
        }

        .calendar-day.today {
            background: var(--bg-primary);
            color: var(--accent-green);
            font-weight: 700;
        }

        .calendar-day.today:active {
            background: rgba(0, 0, 0, 0.85);
        }

        .calendar-day.past {
            opacity: 0.4;
        }

        .calendar-day.empty {
            cursor: default;
        }

        /* Swipe wrappers for day-view tasks */
        .task-item-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .task-swipe-action,
        .task-swipe-done {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            padding: 0 18px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
        }

        .task-swipe-action {
            justify-content: flex-end;
            background: #E24B4A;
            color: white;
        }

        .task-swipe-done {
            justify-content: flex-start;
            background: var(--accent-green);
            color: var(--bg-primary);
        }

        .task-item-wrapper.swiping .task-swipe-action { opacity: 1; }
        .task-item-wrapper.swiping-right .task-swipe-done { opacity: 1; }

        .task-item-wrapper .task-item {
            position: relative;
            z-index: 1;
        }

        .task-item-wrapper.swipe-complete .task-item {
            transition: transform 0.25s ease, opacity 0.25s ease;
            transform: translateX(-110%);
            opacity: 0;
        }

        .task-item-wrapper.swipe-complete-right .task-item {
            transition: transform 0.25s ease, opacity 0.25s ease;
            transform: translateX(110%);
            opacity: 0;
        }

        /* Drag handle for reordering tasks within a day */
        .drag-handle {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1;
            padding: 0 4px 0 8px;
            margin-left: auto;
            cursor: grab;
            touch-action: none; /* let our touch handlers manage gestures */
            user-select: none;
            -webkit-user-select: none;
            opacity: 0.5;
            flex-shrink: 0;
            align-self: center;
        }

        .drag-handle:active {
            cursor: grabbing;
            opacity: 1;
        }

        /* Lift effect while dragging */
        .task-item-wrapper.dragging {
            z-index: 5;
        }

        .task-item-wrapper.dragging .task-item {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transform: scale(1.02);
            opacity: 0.95;
        }

        .task-item-wrapper.drag-shift {
            transition: transform 0.2s ease;
        }

        /* Pull-indicator color in light mode handled by var(--accent-green) */

        .pull-indicator {
            text-align: center;
            padding: 0;
            font-size: 12px;
            color: var(--accent-green);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s ease, padding 0.2s ease;
        }
        .pull-indicator.visible {
            max-height: 48px;
            padding: 14px 0;
        }

        /* Light mode */
        body.light-mode {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #111111;
            --text-secondary: #666666;
            --border-color: #dddddd;
            --task-bg: #f0f0f0;
            background: #f5f5f5 !important;
            color: #111111 !important;
        }

        /* Auth Modal */
        .auth-modal {
            text-align: center;
        }

        .auth-modal p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .notion-connect-btn {
            width: 100%;
            padding: 14px;
            background: #000000;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .notion-connect-btn:hover {
            background: #1a1a1a;
        }

        .sync-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <div class="date-display">CARDIAC CORE</div>
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="status-indicator">
                    <div class="status-dot disconnected" id="statusDot"></div>
                    <span id="statusText">Offline</span>
                </div>
                <button class="menu-btn" onclick="toggleSettings()">☰</button>
            </div>
        </div>
    </div>

    <!-- Day Navigation (Mobile) -->
    <div class="day-nav" id="dayNav">
        <button onclick="changeDay(-1)">←</button>
        <div style="text-align: center; cursor: pointer; padding: 4px 12px;" id="dayNavCenter" onclick="openDayNavPicker()">
            <div class="current-day" id="currentDay">TODAY</div>
            <div style="font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;" id="dateDisplay">&nbsp;</div>
        </div>
        <button onclick="changeDay(1)">→</button>
    </div>

    <!-- Mobile View -->
    <div class="mobile-view" id="mobileView">
        <div id="pullIndicator" class="pull-indicator">↓ Release to sync Notion</div>
        <div class="day-column">
            <div class="task-list" id="mobileTaskList"></div>
        </div>
    </div>

    <!-- Task Board View -->
    <div class="task-board-view" id="taskBoardView">
        <div id="taskBoardContent"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchView('today')">TODAY</button>
        <button class="add-task-btn" onclick="showAddTask()">+</button>
        <button class="nav-item" onclick="switchView('tasks')">TASKS</button>
    </div>

    <!-- Add Task Input -->
    <input type="text" class="add-task-input" id="addTaskInput" placeholder="Add a task..." />

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <div class="settings-title">Settings</div>
            <button class="close-btn" onclick="toggleSettings()">×</button>
        </div>

        <div class="setting-item">
            <div class="setting-toggle">
                <div class="setting-label" style="margin-bottom:0;">Light Mode</div>
                <div class="toggle-switch" id="lightModeToggle" onclick="toggleLightMode()"></div>
            </div>
        </div>

        <div class="setting-item">
            <div class="setting-label">Notion Integration</div>
            <button class="setting-button accent" id="notionAuthBtn" onclick="checkNotionStatus()">
                Check connection
            </button>
            <div class="sync-status" id="notionStatus">Checking…</div>
        </div>

        <div class="setting-item">
            <div class="setting-label">Sync</div>
            <button class="setting-button" onclick="syncFromNotion()" id="syncBtn">
                Pull from Notion
            </button>
        </div>

        <div class="setting-item">
            <div class="setting-label">Data</div>
            <button class="setting-button" onclick="exportTasks()">Export Tasks</button>
        </div>
    </div>

    <!-- Unified Task Sheet (opened on double tap) -->
    <div class="date-picker-overlay" id="taskSheet">
        <div class="date-picker-sheet">
            <div class="date-picker-calendar" id="taskSheetCalendar">
                <div class="calendar-nav">
                    <button class="calendar-nav-btn" id="calPrevMonth">‹</button>
                    <div class="calendar-month-label" id="calMonthLabel"></div>
                    <button class="calendar-nav-btn" id="calNextMonth">›</button>
                </div>
                <div class="calendar-grid" id="calGrid"></div>
            </div>
            <div class="date-picker-header">
                <input type="text" id="taskSheetInput" class="task-sheet-input" placeholder="Task name…" />
                <div class="task-sheet-categories" id="taskSheetCategories"></div>
                <div class="date-picker-quick-btns">
                    <button class="date-picker-quick-btn" id="taskSheetSomeday">Someday list</button>
                    <button class="date-picker-quick-btn" id="taskSheetToday">Today</button>
                </div>
                <div class="task-sheet-footer">
                    <button class="task-sheet-cancel" id="taskSheetCancel">Cancel</button>
                    <button class="task-sheet-backburner" id="taskSheetBackburner">Backburner</button>
                    <button class="task-sheet-save" id="taskSheetSave">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Day-nav Date Picker (jump to today + next 14 days) -->
    <div class="date-picker-overlay" id="dayNavPicker">
        <div class="date-picker-sheet">
            <div class="date-picker-header">
                <div style="font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;">Jump to day</div>
                <div class="day-nav-chips" id="dayNavChips"></div>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentDayOffset = 0;
        let notionConnected = false;
        let tasks = [];
        let collapsedCategories = new Set();

        const categoryColors = {
            'Brain Dump': '#888780',
            'Personal': '#378ADD',
            'Cardiac': '#d4537e',
            'Benefits Board': '#EF9F27',
            'Property Management': '#639922',
            'Estate': '#BA7517',
            'Acquisitions': '#7F77DD',
            'Growth': '#1D9E75',
            'Research': '#888780'
        };

        // Initialize
        async function init() {
            loadTasks();
            loadCollapsedCategories();
            applyLightModePreference();
            rolloverOverdueTasks();
            updateDateDisplay();
            renderTasks();

            // Check Notion connection status (uses server-side env-var token)
            await checkNotionStatus();

            // Handle add task input
            const addTaskInput = document.getElementById('addTaskInput');
            addTaskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && addTaskInput.value.trim()) {
                    addTask(addTaskInput.value.trim());
                    addTaskInput.value = '';
                    addTaskInput.classList.remove('visible');
                }
            });

            addTaskInput.addEventListener('blur', () => {
                setTimeout(() => addTaskInput.classList.remove('visible'), 200);
            });

            initTaskBoardEvents();
            initOverlayDismissals();
            initPullToRefresh();
        }

        // Check Notion connection status (single-user / server-token mode)
        async function checkNotionStatus() {
            const notionStatus = document.getElementById('notionStatus');
            if (notionStatus) notionStatus.textContent = 'Checking…';

            try {
                const response = await fetch('/api/notion/status', {
                    headers: { 'Accept': 'application/json' },
                });

                if (!response.ok) {
                    throw new Error(`Status check failed (${response.status})`);
                }

                const data = await response.json();
                notionConnected = data.connected === true;
                updateConnectionUI(data);

                if (notionConnected) {
                    // Auto-sync on first successful connection check
                    await syncFromNotion({ silent: true });
                }
            } catch (error) {
                console.error('Error checking Notion status:', error);
                notionConnected = false;
                updateConnectionUI({ connected: false, error: error.message });
            }
        }

        function updateConnectionUI(data = {}) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const authBtn = document.getElementById('notionAuthBtn');
            const notionStatus = document.getElementById('notionStatus');

            if (notionConnected) {
                statusDot.classList.remove('disconnected');
                statusText.textContent = 'Synced';
                authBtn.textContent = '✓ Notion Connected';
                notionStatus.textContent = data.databaseTitle
                    ? `Connected to "${data.databaseTitle}"`
                    : 'Connected';
            } else {
                statusDot.classList.add('disconnected');
                statusText.textContent = 'Offline';
                authBtn.textContent = 'Retry connection';
                notionStatus.textContent = data.error
                    ? `Not connected: ${data.error}`
                    : 'Not connected';
            }
        }

        // Tasks
        function loadTasks() {
            const saved = localStorage.getItem('cardiacTasks');
            if (saved) {
                tasks = JSON.parse(saved);
            } else {
                tasks = [
                    {
                        id: 1,
                        text: 'Send art and Gayla email update',
                        completed: false,
                        dayOffset: 0,
                        category: 'Personal',
                        order: 0,
                        createdAt: new Date().toISOString()
                    },
                    {
                        id: 2,
                        text: 'Call Aaron',
                        completed: false,
                        dayOffset: 0,
                        category: 'Personal',
                        order: 1,
                        createdAt: new Date().toISOString()
                    },
                    {
                        id: 3,
                        text: 'Message Aptive',
                        completed: false,
                        dayOffset: 0,
                        category: 'Property Management',
                        order: 2,
                        createdAt: new Date().toISOString()
                    },
                    {
                        id: 4,
                        text: 'Buy mom iPad',
                        completed: false,
                        dayOffset: 0,
                        category: 'Personal',
                        order: 3,
                        createdAt: new Date().toISOString()
                    }
                ];
                saveTasks();
            }
        }

        function saveTasks() {
            localStorage.setItem('cardiacTasks', JSON.stringify(tasks));
        }

        function updateDateDisplay() {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            
            const date = new Date();
            date.setDate(date.getDate() + currentDayOffset);
            
            const dayName = days[date.getDay()];
            const monthName = months[date.getMonth()];
            const dayNum = date.getDate();
            
            let label = currentDayOffset === 0 ? 'TODAY' : currentDayOffset === -1 ? 'YESTERDAY' : currentDayOffset === 1 ? 'TOMORROW' : dayName.toUpperCase();
            
            document.getElementById('currentDay').textContent = label;
            document.getElementById('dateDisplay').textContent = `${dayName}, ${monthName} ${dayNum}`;
        }

        function changeDay(offset) {
            currentDayOffset += offset;
            updateDateDisplay();
            renderTasks();
        }

        function jumpToDay(offset) {
            currentDayOffset = offset;
            updateDateDisplay();
            renderTasks();
            closeDayNavPicker();
        }

        // Day-nav date picker: bottom-sheet listing today + next 14 days.
        // Opens when the user taps the day-nav center label.
        function openDayNavPicker() {
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const chips = document.getElementById('dayNavChips');
            chips.innerHTML = '';

            for (let i = 0; i <= 14; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const label = i === 0 ? 'Today'
                    : i === 1 ? 'Tomorrow'
                    : `${dayNames[d.getDay()]} ${monthNames[d.getMonth()]} ${d.getDate()}`;
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'day-nav-chip' + (i === currentDayOffset ? ' current' : '');
                chip.textContent = label;
                chip.addEventListener('click', () => jumpToDay(i));
                chips.appendChild(chip);
            }

            document.getElementById('dayNavPicker').classList.add('visible');
        }

        function closeDayNavPicker() {
            document.getElementById('dayNavPicker').classList.remove('visible');
        }

        function renderTasks() {
            const list = document.getElementById('mobileTaskList');
            const dayTasks = tasks
                .filter(t => t.dayOffset === currentDayOffset && !t.backburner)
                .sort((a, b) => (a.order || 0) - (b.order || 0));

            if (dayTasks.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px 20px; font-size: 14px;">No tasks for this day</div>';
                if (currentView === 'tasks') renderTaskBoard();
                return;
            }

            list.innerHTML = dayTasks.map(task => {
                const categoryColor = categoryColors[task.category] || '#888780';
                return `
                    <div class="task-item-wrapper" data-task-id="${task.id}">
                        <div class="task-swipe-done">✓ DONE</div>
                        <div class="task-swipe-action">← UNSCHEDULE</div>
                        <div class="task-item">
                            <div class="task-checkbox ${task.completed ? 'checked' : ''}"></div>
                            <div class="task-text ${task.completed ? 'completed' : ''}">
                                ${escapeHtml(task.text)}
                                <div class="task-category">
                                    <span class="category-dot" style="background-color: ${categoryColor}"></span>
                                    ${escapeHtml(task.category)}
                                </div>
                            </div>
                            <div class="drag-handle" data-role="drag-handle" aria-label="Reorder">⠿</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Attach gesture listeners to each newly-rendered wrapper.
            list.querySelectorAll('.task-item-wrapper').forEach(wrapper => {
                attachDayViewListeners(wrapper);
                attachDragHandleListeners(wrapper);
            });

            if (currentView === 'tasks') renderTaskBoard();
        }

        function addTask(text) {
            const task = {
                id: Date.now(),
                text: text,
                completed: false,
                dayOffset: currentDayOffset,
                category: 'Personal',
                order: tasks.filter(t => t.dayOffset === currentDayOffset).length,
                createdAt: new Date().toISOString()
            };
            tasks.push(task);
            saveTasks();
            renderTasks();
            
            // Sync to Notion if connected
            if (notionConnected) {
                pushTaskToNotion(task);
            }
        }

        function toggleTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                
                if (notionConnected) {
                    pushTaskToNotion(task);
                }
            }
        }

        function showAddTask() {
            const input = document.getElementById('addTaskInput');
            input.classList.add('visible');
            input.focus();
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('open');
        }

        // Notion Sync
        async function syncFromNotion({ silent = false } = {}) {
            if (!notionConnected) {
                if (!silent) alert('Not connected to Notion');
                return;
            }

            const syncBtn = document.getElementById('syncBtn');
            if (syncBtn) {
                syncBtn.disabled = true;
                syncBtn.textContent = 'Syncing...';
            }

            try {
                const response = await fetch('/api/notion/sync', {
                    headers: { 'Accept': 'application/json' },
                });
                if (!response.ok) {
                    let detail = response.statusText;
                    try {
                        const err = await response.json();
                        if (err.error) detail = err.error;
                    } catch { /* keep statusText */ }
                    throw new Error(detail || 'Sync failed');
                }

                const data = await response.json();
                const remoteTasks = Array.isArray(data.tasks) ? data.tasks : [];

                // Merge remote tasks. Use a counter-based ID to avoid Date.now() collisions
                // when multiple new tasks arrive in the same millisecond.
                let nextLocalId = Date.now();
                for (const remote of remoteTasks) {
                    const idx = tasks.findIndex(t => t.notionId === remote.id);
                    if (idx >= 0) {
                        tasks[idx] = {
                            ...tasks[idx],
                            text: remote.title,
                            completed: remote.completed,
                            category: remote.category || tasks[idx].category || 'Brain Dump',
                            dayOffset: remote.dayOffset != null ? remote.dayOffset : tasks[idx].dayOffset,
                        };
                    } else {
                        tasks.push({
                            id: nextLocalId++,
                            notionId: remote.id,
                            text: remote.title,
                            completed: remote.completed,
                            dayOffset: remote.dayOffset != null ? remote.dayOffset : 999,
                            category: remote.category || 'Brain Dump',
                            order: tasks.length,
                            createdAt: new Date().toISOString(),
                        });
                    }
                }

                saveTasks();
                renderTasks();
                if (!silent) alert(`Synced ${remoteTasks.length} tasks from Notion`);
            } catch (error) {
                console.error('Sync error:', error);
                if (!silent) alert('Sync failed: ' + error.message);
            } finally {
                if (syncBtn) {
                    syncBtn.disabled = false;
                    syncBtn.textContent = 'Pull from Notion';
                }
            }
        }

        async function pushTaskToNotion(task) {
            if (!notionConnected) return;

            try {
                const response = await fetch('/api/notion/push-task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(task),
                });
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    console.error('Push failed:', err.error || response.statusText);
                    return;
                }
                const data = await response.json();
                // If this was a create, store the returned notionId on the local task.
                if (data.task && data.task.id && !task.notionId) {
                    const local = tasks.find(t => t.id === task.id);
                    if (local) {
                        local.notionId = data.task.id;
                        saveTasks();
                    }
                }
            } catch (error) {
                console.error('Push error:', error);
            }
        }

        // Archive a Notion page so it stops coming back on sync. Returns true on
        // success, false on any failure — caller decides whether to surface the
        // error to the user.
        async function archiveTaskInNotion(notionId) {
            if (!notionConnected || !notionId) return false;

            try {
                const response = await fetch('/api/notion/archive-task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ notionId }),
                });
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    console.error('Archive failed:', err.error || response.statusText);
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Archive error:', error);
                return false;
            }
        }

        function exportTasks() {
            const dataStr = JSON.stringify(tasks, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `cardiac-core-tasks-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }

        let currentView = 'today';

        function rolloverOverdueTasks() {
            // Move incomplete tasks from past days to today. Someday (999) and
            // backburner tasks are left alone.
            let changed = false;
            for (const task of tasks) {
                if (task.backburner) continue;
                if (!task.completed && task.dayOffset != null && task.dayOffset < 0 && task.dayOffset !== 999) {
                    task.dayOffset = 0;
                    changed = true;
                    // Push to Notion if connected so the rollover is reflected there too.
                    if (notionConnected) pushTaskToNotion(task);
                }
            }
            if (changed) saveTasks();
        }

        function applyLightModePreference() {
            const isLight = localStorage.getItem('cardiacLightMode') === '1';
            document.body.classList.toggle('light-mode', isLight);
            const toggle = document.getElementById('lightModeToggle');
            if (toggle) toggle.classList.toggle('on', isLight);
        }

        function toggleLightMode() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('cardiacLightMode', isLight ? '1' : '0');
            const toggle = document.getElementById('lightModeToggle');
            if (toggle) toggle.classList.toggle('on', isLight);
        }

        function switchView(view) {
            if (view !== 'today' && view !== 'tasks') return;
            currentView = view;

            const mobileView = document.getElementById('mobileView');
            const dayNav = document.getElementById('dayNav');
            const boardView = document.getElementById('taskBoardView');

            const navButtons = document.querySelectorAll('.bottom-nav .nav-item');
            navButtons.forEach(btn => {
                const handler = btn.getAttribute('onclick') || '';
                const isActive =
                    (view === 'today' && handler.includes("'today'")) ||
                    (view === 'tasks' && handler.includes("'tasks'"));
                btn.classList.toggle('active', isActive);
            });

            if (view === 'tasks') {
                mobileView.classList.add('hidden');
                dayNav.classList.add('hidden');
                boardView.classList.add('active');
                renderTaskBoard();
            } else {
                mobileView.classList.remove('hidden');
                dayNav.classList.remove('hidden');
                boardView.classList.remove('active');
                renderTasks();
            }
        }

        function renderTaskBoard() {
            const container = document.getElementById('taskBoardContent');

            // The board is the "unscheduled / someday" bucket. Tasks with a real
            // dayOffset live in the day view; the board shows what hasn't been
            // scheduled yet. Treat null/undefined and 999 both as unscheduled.
            const isUnscheduled = t => t.dayOffset == null || t.dayOffset === 999;

            // Show every category we know about, even if empty, so users can
            // add tasks straight into a fresh category.
            const groups = {};
            const knownOrder = Object.keys(categoryColors);
            for (const cat of knownOrder) groups[cat] = [];
            const backburnerTasks = [];
            for (const task of tasks) {
                if (task.completed) continue;
                if (task.backburner) {
                    backburnerTasks.push(task);
                    continue;
                }
                if (!isUnscheduled(task)) continue;
                const cat = task.category || 'Brain Dump';
                if (!groups[cat]) groups[cat] = [];
                groups[cat].push(task);
            }

            const orderedCats = [
                ...knownOrder,
                ...Object.keys(groups).filter(c => !knownOrder.includes(c)),
            ];

            const mainHtml = orderedCats.map(cat => {
                const color = categoryColors[cat] || '#888780';
                const items = groups[cat]
                    .slice()
                    .sort((a, b) => (a.order || 0) - (b.order || 0));
                const collapsed = collapsedCategories.has(cat);
                const catAttr = escapeHtml(cat);
                const rows = items.map(task => `
                    <div class="task-item" data-task-id="${task.id}">
                        <div class="task-checkbox ${task.completed ? 'checked' : ''}"></div>
                        <div class="task-text ${task.completed ? 'completed' : ''}">
                            ${escapeHtml(task.text)}
                        </div>
                    </div>
                `).join('');
                return `
                    <div class="category-group ${collapsed ? 'collapsed' : ''}" data-cat="${catAttr}">
                        <div class="category-group-header" data-action="toggle-collapse">
                            <span class="category-group-chevron">▼</span>
                            <span class="category-dot" style="background-color: ${color}"></span>
                            <span>${escapeHtml(cat)}</span>
                            <span class="category-group-count">${items.length}</span>
                            <button class="category-group-add" data-action="show-add" aria-label="Add task to ${catAttr}">+</button>
                        </div>
                        <div class="category-group-body">
                            <input type="text" class="category-add-input" data-action="add-input" placeholder="Add to ${catAttr}…" />
                            ${rows || '<div style="color: var(--text-secondary); font-size: 13px; padding: 4px 0;">No tasks</div>'}
                        </div>
                    </div>
                `;
            }).join('');

            // Backburner section — only rendered when there's at least one task.
            // Sentinel category key '__backburner' is used in `collapsedCategories`
            // so its collapsed state persists like any other group. Defaults to
            // collapsed (added on first render below).
            const BACKBURNER_KEY = '__backburner';
            if (backburnerTasks.length > 0 && !collapsedCategories.has(BACKBURNER_KEY)
                && !localStorage.getItem('cardiacBackburnerInit')) {
                collapsedCategories.add(BACKBURNER_KEY);
                saveCollapsedCategories();
                localStorage.setItem('cardiacBackburnerInit', '1');
            }
            const bbCollapsed = collapsedCategories.has(BACKBURNER_KEY);
            const bbRows = backburnerTasks
                .slice()
                .sort((a, b) => (a.order || 0) - (b.order || 0))
                .map(task => {
                    const color = categoryColors[task.category] || '#888780';
                    return `
                        <div class="task-item" data-task-id="${task.id}">
                            <div class="task-checkbox ${task.completed ? 'checked' : ''}"></div>
                            <div class="task-text ${task.completed ? 'completed' : ''}">
                                ${escapeHtml(task.text)}
                                <div class="task-category">
                                    <span class="category-dot" style="background-color: ${color}"></span>
                                    ${escapeHtml(task.category || 'Brain Dump')}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            const backburnerHtml = backburnerTasks.length > 0 ? `
                <div class="backburner-section">
                    <div class="category-group ${bbCollapsed ? 'collapsed' : ''}" data-cat="${BACKBURNER_KEY}">
                        <div class="category-group-header" data-action="toggle-collapse">
                            <span class="category-group-chevron">▼</span>
                            <span>🔥 Backburner</span>
                            <span class="category-group-count">${backburnerTasks.length}</span>
                        </div>
                        <div class="category-group-body">
                            ${bbRows}
                        </div>
                    </div>
                </div>
            ` : '';

            container.innerHTML = mainHtml + backburnerHtml;

            // Attach gesture listeners to each task on the board.
            container.querySelectorAll('.task-item[data-task-id]').forEach(attachBoardTaskListeners);
        }

        function loadCollapsedCategories() {
            try {
                const saved = localStorage.getItem('cardiacCollapsedCategories');
                if (saved) collapsedCategories = new Set(JSON.parse(saved));
            } catch (err) {
                console.error('Failed to load collapsed categories:', err);
                collapsedCategories = new Set();
            }
        }

        function saveCollapsedCategories() {
            try {
                localStorage.setItem(
                    'cardiacCollapsedCategories',
                    JSON.stringify([...collapsedCategories])
                );
            } catch (err) {
                console.error('Failed to save collapsed categories:', err);
            }
        }

        function toggleCategoryCollapse(cat) {
            if (collapsedCategories.has(cat)) {
                collapsedCategories.delete(cat);
            } else {
                collapsedCategories.add(cat);
            }
            saveCollapsedCategories();

            // Toggle in place rather than full re-render so any in-progress
            // text the user typed in another category's add input is preserved.
            const group = document.querySelector(
                `.category-group[data-cat="${cssEscape(cat)}"]`
            );
            if (group) group.classList.toggle('collapsed');
        }

        function showCategoryAddInput(cat) {
            // If collapsed, expand first so the input is visible.
            if (collapsedCategories.has(cat)) {
                toggleCategoryCollapse(cat);
            }
            const group = document.querySelector(
                `.category-group[data-cat="${cssEscape(cat)}"]`
            );
            if (!group) return;
            const input = group.querySelector('.category-add-input');
            if (!input) return;
            input.classList.add('visible');
            input.focus();
        }

        function addTaskToCategory(cat, text) {
            const trimmed = String(text || '').trim();
            if (!trimmed) return;
            const task = {
                id: Date.now(),
                text: trimmed,
                completed: false,
                dayOffset: 999, // unscheduled — lives in Someday until scheduled
                category: cat,
                order: tasks.filter(t => t.dayOffset === 999).length,
                createdAt: new Date().toISOString(),
            };
            tasks.push(task);
            saveTasks();
            renderTaskBoard();
            if (notionConnected) pushTaskToNotion(task);
        }

        // Minimal CSS.escape polyfill — only handles the chars we care about
        // for category names (quotes, backslashes).
        function cssEscape(s) {
            if (window.CSS && typeof CSS.escape === 'function') return CSS.escape(s);
            return String(s).replace(/(["'\\])/g, '\\$1');
        }

        function initTaskBoardEvents() {
            const board = document.getElementById('taskBoardContent');
            if (!board) return;

            board.addEventListener('click', (e) => {
                const addBtn = e.target.closest('.category-group-add');
                const header = e.target.closest('.category-group-header');

                // Add button takes priority — it sits inside the header.
                if (addBtn) {
                    e.stopPropagation();
                    const group = addBtn.closest('.category-group');
                    if (group) showCategoryAddInput(group.dataset.cat);
                    return;
                }
                if (header) {
                    const group = header.closest('.category-group');
                    if (group) toggleCategoryCollapse(group.dataset.cat);
                    return;
                }
                // Single taps on task cards intentionally do nothing — see
                // attachBoardTaskListeners for the full gesture set
                // (double-tap → edit, triple-tap → today, long-press → day picker).
            });

            board.addEventListener('keypress', (e) => {
                if (e.key !== 'Enter') return;
                const input = e.target.closest('.category-add-input');
                if (!input) return;
                const group = input.closest('.category-group');
                if (!group) return;
                const cat = group.dataset.cat;
                const value = input.value;
                input.value = '';
                input.classList.remove('visible');
                addTaskToCategory(cat, value);
            });

            board.addEventListener('blur', (e) => {
                const input = e.target.closest && e.target.closest('.category-add-input');
                if (!input) return;
                // Small delay so an Enter that fires blur first still commits.
                setTimeout(() => input.classList.remove('visible'), 150);
            }, true);
        }

        // ── Unified Task Sheet ──────────────────────────────────
        // Opens on double tap. Combines task-name editing, category selection,
        // date picker (Someday / Today / arbitrary calendar date), and delete
        // into a single screen.
        let taskSheetTaskId = null;
        let calViewYear = 0;
        let calViewMonth = 0; // 0-based

        function openTaskSheet(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            taskSheetTaskId = taskId;

            // Name input
            document.getElementById('taskSheetInput').value = task.text;

            // Categories
            const cats = document.getElementById('taskSheetCategories');
            cats.innerHTML = Object.entries(categoryColors).map(([name, color]) => `
                <div class="task-sheet-cat ${task.category === name ? 'selected' : ''}"
                     style="background: ${color}22; color: ${color};"
                     data-category="${escapeHtml(name)}">
                    ${escapeHtml(name)}
                </div>
            `).join('');
            cats.querySelectorAll('.task-sheet-cat').forEach(chip => {
                chip.addEventListener('click', () => {
                    cats.querySelectorAll('.task-sheet-cat').forEach(c => c.classList.remove('selected'));
                    chip.classList.add('selected');
                });
            });

            // Backburner button — label and active state reflect current status.
            const bbBtn = document.getElementById('taskSheetBackburner');
            if (bbBtn) {
                bbBtn.textContent = task.backburner ? 'Restore' : 'Backburner';
                bbBtn.classList.toggle('active', !!task.backburner);
            }

            // Default calendar to current month
            const now = new Date();
            calViewYear = now.getFullYear();
            calViewMonth = now.getMonth();
            renderCalendar();

            document.getElementById('taskSheet').classList.add('visible');
        }

        function closeTaskSheet() {
            document.getElementById('taskSheet').classList.remove('visible');
            taskSheetTaskId = null;
        }

        // Cancel: dismiss without persisting. Edits typed in the input are
        // discarded because we never wrote them back to the task.
        function cancelTaskSheet() {
            closeTaskSheet();
        }

        // Persist the name + category edits without closing. Used before any
        // date-assignment action so the user doesn't lose typed changes.
        function persistTaskSheetEdits() {
            const task = tasks.find(t => t.id === taskSheetTaskId);
            if (!task) return null;
            const newText = document.getElementById('taskSheetInput').value.trim();
            const selectedChip = document.querySelector('#taskSheetCategories .task-sheet-cat.selected');
            if (newText) task.text = newText;
            if (selectedChip) task.category = selectedChip.getAttribute('data-category');
            return task;
        }

        function saveTaskSheet() {
            const task = persistTaskSheetEdits();
            if (!task) { closeTaskSheet(); return; }
            saveTasks();
            renderActiveView();
            closeTaskSheet();
            if (notionConnected) pushTaskToNotion(task);
        }

        // Toggle backburner status. Persists any pending edits first so the
        // user doesn't lose changes. Note: backburner is a local-only flag —
        // we don't push it to Notion since there's no equivalent property in
        // the user's schema. The category and dayOffset are preserved so the
        // task can be restored exactly where it was.
        function toggleTaskSheetBackburner() {
            const task = persistTaskSheetEdits();
            if (!task) { closeTaskSheet(); return; }
            task.backburner = !task.backburner;
            saveTasks();
            renderActiveView();
            closeTaskSheet();
            if (notionConnected) pushTaskToNotion(task);
        }

        // Shared delete path. Kept available even though the UI no longer
        // exposes it directly — backburner is the user-facing alternative.
        // Wire to a button or call from the console if a hard delete is ever
        // needed; archives the Notion page first so it doesn't resurrect on
        // the next sync, then removes the task locally.
        async function deleteTaskById(taskId, { confirmFirst = true } = {}) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            if (confirmFirst) {
                const ok = window.confirm(`Delete "${task.text}"? This cannot be undone from the app.`);
                if (!ok) return;
            }

            if (notionConnected && task.notionId) {
                const ok = await archiveTaskInNotion(task.notionId);
                if (!ok) {
                    window.alert('Could not archive in Notion. Task was not deleted.');
                    return;
                }
            }

            tasks = tasks.filter(t => t.id !== taskId);
            saveTasks();
            renderActiveView();
        }

        function renderActiveView() {
            if (currentView === 'tasks') renderTaskBoard();
            else renderTasks();
        }

        function renderCalendar() {
            const monthNames = ['January','February','March','April','May','June',
                                'July','August','September','October','November','December'];
            document.getElementById('calMonthLabel').textContent =
                `${monthNames[calViewMonth]} ${calViewYear}`;

            const today = new Date();
            today.setHours(0,0,0,0);

            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';

            // Day-of-week headers
            ['S','M','T','W','T','F','S'].forEach(d => {
                const el = document.createElement('div');
                el.className = 'calendar-dow';
                el.textContent = d;
                grid.appendChild(el);
            });

            // First day of the month
            const first = new Date(calViewYear, calViewMonth, 1);
            const startDow = first.getDay(); // 0=Sun

            // Empty cells before the 1st
            for (let i = 0; i < startDow; i++) {
                const el = document.createElement('div');
                el.className = 'calendar-day empty';
                grid.appendChild(el);
            }

            // Days in month
            const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(calViewYear, calViewMonth, day);
                date.setHours(0,0,0,0);
                const diffMs = date - today;
                const diffDays = Math.round(diffMs / 86400000);
                const isPast = diffDays < 0;

                const el = document.createElement('div');
                el.className = 'calendar-day' +
                    (diffDays === 0 ? ' today' : '') +
                    (isPast ? ' past' : '');
                el.textContent = day;

                el.addEventListener('click', () => {
                    assignTaskDay(taskSheetTaskId, diffDays);
                });

                grid.appendChild(el);
            }
        }

        function assignTaskDay(taskId, dayOffset) {
            if (taskId == null) { closeTaskSheet(); return; }
            // Persist any pending name/category edits first so they aren't lost.
            const task = persistTaskSheetEdits();
            if (!task) { closeTaskSheet(); return; }
            task.dayOffset = dayOffset;
            task.order = tasks.filter(t => t.dayOffset === dayOffset).length;
            saveTasks();
            renderActiveView();
            closeTaskSheet();
            if (notionConnected) pushTaskToNotion(task);
        }

        // Wire up the static parts of the task sheet (calendar nav, quick
        // buttons, dismissal). Done on DOMContentLoaded so the DOM is ready.
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('calPrevMonth').addEventListener('click', () => {
                calViewMonth--;
                if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
                renderCalendar();
            });
            document.getElementById('calNextMonth').addEventListener('click', () => {
                calViewMonth++;
                if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
                renderCalendar();
            });
            document.getElementById('taskSheetSomeday').addEventListener('click', () => {
                assignTaskDay(taskSheetTaskId, 999);
            });
            document.getElementById('taskSheetToday').addEventListener('click', () => {
                assignTaskDay(taskSheetTaskId, 0);
            });
            document.getElementById('taskSheetSave').addEventListener('click', saveTaskSheet);
            document.getElementById('taskSheetCancel').addEventListener('click', cancelTaskSheet);
            document.getElementById('taskSheetBackburner').addEventListener('click', toggleTaskSheetBackburner);
            document.getElementById('taskSheet').addEventListener('click', e => {
                if (e.target === document.getElementById('taskSheet')) closeTaskSheet();
            });
            document.getElementById('dayNavPicker').addEventListener('click', e => {
                if (e.target === document.getElementById('dayNavPicker')) closeDayNavPicker();
            });
        });

        function initOverlayDismissals() {
            // Task sheet dismissal is wired in DOMContentLoaded above.
        }

        // ── Board-task gesture handling ─────────────────────────
        // Single tap = no-op (intentional, prevents fat-finger toggles).
        // Double tap = unified task sheet. Triple tap = schedule to today.
        function attachBoardTaskListeners(item) {
            let tapCount = 0;
            let tapTimer = null;
            let mode = null; // 'tap' | 'cancelled'
            let startX = 0, startY = 0;

            item.addEventListener('touchstart', e => {
                if (!e.touches[0]) return;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                mode = 'tap';
                tapCount += 1;

                clearTimeout(tapTimer);
                tapTimer = setTimeout(() => {
                    if (mode !== 'tap') return;
                    const count = tapCount;
                    tapCount = 0;
                    const taskId = Number(item.dataset.taskId);

                    if (count === 2) {
                        openTaskSheet(taskId);
                    } else if (count >= 3) {
                        scheduleBoardTaskToToday(taskId);
                    }
                    // count === 1: deliberately nothing
                }, 350);
            }, { passive: true });

            item.addEventListener('touchmove', e => {
                if (!e.touches[0]) return;
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;
                if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                    mode = 'cancelled';
                    tapCount = 0;
                    clearTimeout(tapTimer);
                }
            }, { passive: true });

            // Desktop fallback: dblclick opens the unified sheet.
            item.addEventListener('dblclick', e => {
                e.stopPropagation();
                openTaskSheet(Number(item.dataset.taskId));
            });
        }

        function scheduleBoardTaskToToday(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            task.dayOffset = 0;
            task.order = tasks.filter(t => t.dayOffset === 0).length;
            saveTasks();
            renderTaskBoard();
            if (notionConnected) pushTaskToNotion(task);
        }

        // ── Day-view gesture handling ───────────────────────────
        // Single tap = no-op (avoids fat-finger mistakes).
        // Double tap = unified task sheet.
        // Swipe right = complete, Swipe left = unschedule.
        function attachDayViewListeners(wrapper) {
            const taskItem = wrapper.querySelector('.task-item');
            if (!taskItem) return;

            let startX = 0, startY = 0, currentX = 0;
            let isHorizontal = null;
            let lastTapTime = 0;
            let touchHandled = false; // Block synthetic click after touch
            let onHandle = false;     // True when the touch started on the drag handle

            wrapper.addEventListener('touchstart', e => {
                if (!e.touches[0]) return;
                // Drag handle owns its own touch sequence — don't compete with it.
                onHandle = !!(e.target && e.target.closest && e.target.closest('[data-role="drag-handle"]'));
                if (onHandle) return;

                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                currentX = 0;
                isHorizontal = null;
                touchHandled = true;

                const taskId = Number(wrapper.dataset.taskId);
                const now = Date.now();

                // Double tap → unified task sheet
                if (now - lastTapTime < 350) {
                    lastTapTime = 0;
                    openTaskSheet(taskId);
                    return;
                }
                lastTapTime = now;
            }, { passive: true });

            wrapper.addEventListener('touchmove', e => {
                if (onHandle) return;
                if (!e.touches[0]) return;
                const dx = e.touches[0].clientX - startX;
                const dy = e.touches[0].clientY - startY;

                if (isHorizontal === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
                    isHorizontal = Math.abs(dx) > Math.abs(dy);
                    if (!isHorizontal) return;
                }
                if (!isHorizontal) return;

                e.preventDefault();
                currentX = dx;
                taskItem.style.transition = 'none';
                taskItem.style.transform = `translateX(${currentX}px)`;
                wrapper.classList.toggle('swiping', currentX < -20);
                wrapper.classList.toggle('swiping-right', currentX > 20);
            }, { passive: false });

            wrapper.addEventListener('touchend', () => {
                if (onHandle) { onHandle = false; return; }
                const taskId = Number(wrapper.dataset.taskId);

                if (isHorizontal) {
                    if (currentX < -60) {
                        wrapper.classList.add('swipe-complete');
                        setTimeout(() => unscheduleTask(taskId), 250);
                    } else if (currentX > 60) {
                        wrapper.classList.add('swipe-complete-right');
                        setTimeout(() => toggleTask(taskId), 250);
                    } else {
                        taskItem.style.transition = 'transform 0.2s ease';
                        taskItem.style.transform = 'translateX(0)';
                        wrapper.classList.remove('swiping', 'swiping-right');
                    }
                }
                // Single tap on day view: deliberately no-op.

                isHorizontal = null;
                currentX = 0;
            });

            // Desktop: single click no-op, dblclick opens task sheet. Touch path skips click.
            taskItem.addEventListener('click', () => {
                if (touchHandled) return;
                // No-op on desktop click as well.
            });
            taskItem.addEventListener('dblclick', () => {
                openTaskSheet(Number(wrapper.dataset.taskId));
            });
        }

        function unscheduleTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            task.dayOffset = 999;
            task.order = 0;
            saveTasks();
            renderActiveView();

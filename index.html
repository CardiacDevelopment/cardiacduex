<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cardiac Core - Notion Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 340px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    h2 { margin: 0 0 20px; }
    button {
      padding: 14px 20px;
      border-radius: 8px;
      border: none;
      background: #00ff66;
      color: black;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #bdbdbd;
      line-height: 1.4;
      min-height: 42px;
    }
    .success { color: #00ff66; }
    .error { color: #ff6b6b; }
    .subtle { color: #888; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Connect Notion</h2>
    <button id="connectBtn" onclick="connectNotionOAuth()">Connect with Notion</button>
    <div class="status" id="statusText">Checking connection…</div>
    <div class="subtle" id="workspaceText"></div>
  </div>

  <script>
    var NOTION_API_BASE = '/api/notion';
    var notionAuthStateKey = 'notion_oauth_state';

    async function connectNotionOAuth() {
      try {
        const state = (window.crypto && crypto.randomUUID)
          ? crypto.randomUUID()
          : String(Date.now());

        sessionStorage.setItem(notionAuthStateKey, state);

        const res = await fetch(`${NOTION_API_BASE}/auth-url?state=${encodeURIComponent(state)}`);
        const data = await res.json();

        if (!res.ok || !data.url) {
          throw new Error(data.error || 'Failed to get auth URL');
        }

        window.location.assign(data.url);
      } catch (err) {
        setStatus(`Connect with Notion failed: ${err.message}`, 'error');
      }
    }

    function setStatus(message, kind) {
      const el = document.getElementById('statusText');
      el.textContent = message;
      el.className = `status ${kind || ''}`;
    }

    async function refreshStatus() {
      try {
        const res = await fetch(`${NOTION_API_BASE}/status`, { credentials: 'same-origin' });
        const data = await res.json();

        if (data.connected) {
          setStatus('Connected to Notion', 'success');
          document.getElementById('workspaceText').textContent =
            data.workspace_name ? `Workspace: ${data.workspace_name}` : '';
          document.getElementById('connectBtn').textContent = 'Reconnect Notion';
        } else {
          setStatus('Click to authenticate', '');
          document.getElementById('workspaceText').textContent = '';
        }
      } catch (err) {
        setStatus(`Status check failed: ${err.message}`, 'error');
      }
    }

    function handleQueryParams() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('notion_connected') === '1') {
        setStatus('Connected to Notion', 'success');
      } else if (params.get('error')) {
        setStatus(`Connect with Notion failed: ${params.get('error')}`, 'error');
      }
      if (params.has('notion_connected') || params.has('error')) {
        const cleanUrl = `${window.location.origin}${window.location.pathname}`;
        window.history.replaceState({}, '', cleanUrl);
      }
    }

    handleQueryParams();
    refreshStatus();
  </script>
</body>
</html>

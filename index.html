<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cardiac Core - Notion Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 320px;
    }
    h2 { margin-bottom: 20px; }
    button {
      padding: 14px 20px;
      border-radius: 8px;
      border: none;
      background: #00ff66;
      color: black;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .status {
      margin-top: 15px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Connect Notion</h2>
    <button onclick="connectNotionOAuth()">Connect with Notion</button>
    <div class="status">Click to authenticate with Notion</div>
  </div>

  <script>
    var NOTION_API_BASE = '/api/notion';
    var notionAuthStateKey = 'notion_oauth_state';

    async function connectNotionOAuth() {
      try {
        const state = (window.crypto && crypto.randomUUID)
          ? crypto.randomUUID()
          : String(Date.now());

        sessionStorage.setItem(notionAuthStateKey, state);

        const res = await fetch(`${NOTION_API_BASE}/auth-url?state=${encodeURIComponent(state)}`);
        const data = await res.json();

        if (!res.ok || !data.url) {
          throw new Error(data.error || "Failed to get auth URL");
        }

        window.location.assign(data.url);

      } catch (err) {
        alert("Connect with Notion failed:\n\n" + err.message);
      }
    }
  </script>
</body>
</html>
